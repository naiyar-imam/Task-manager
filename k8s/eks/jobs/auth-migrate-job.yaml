apiVersion: batch/v1
kind: Job
metadata:
  name: auth-service-migrate
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-auth-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z auth-db 5432; do echo waiting for auth-db; sleep 2; done"]
      containers:
        - name: migrate
          image: task-manager-auth-service
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - python manage.py migrate --noinput
          envFrom:
            - configMapRef:
                name: task-manager-production-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: auth-database-url
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: auth-django-secret-key
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: shared-jwt-signing-key
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-production-config
                  key: AUTH_ALLOWED_HOSTS
            - name: CSRF_TRUSTED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-production-config
                  key: AUTH_CSRF_TRUSTED_ORIGINS
