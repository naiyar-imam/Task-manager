apiVersion: batch/v1
kind: Job
metadata:
  name: calendar-service-migrate
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-calendar-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z calendar-db 5432; do echo waiting for calendar-db; sleep 2; done"]
      containers:
        - name: migrate
          image: task-manager-calendar-service
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - python manage.py migrate --noinput
          envFrom:
            - configMapRef:
                name: task-manager-production-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: calendar-database-url
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: calendar-django-secret-key
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: shared-jwt-signing-key
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-production-config
                  key: CALENDAR_ALLOWED_HOSTS
            - name: CSRF_TRUSTED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-production-config
                  key: CALENDAR_CSRF_TRUSTED_ORIGINS
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: google-client-secret
            - name: GOOGLE_CALENDAR_ID
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: google-calendar-id
