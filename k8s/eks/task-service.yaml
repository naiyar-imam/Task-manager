apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-task-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z task-db 5432; do echo waiting for task-db; sleep 2; done"]
      containers:
        - name: task-service
          image: task-manager-task-service
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: task-manager-production-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: task-database-url
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: task-django-secret-key
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-production-secrets
                  key: shared-jwt-signing-key
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-production-config
                  key: TASK_ALLOWED_HOSTS
            - name: CSRF_TRUSTED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-production-config
                  key: TASK_CSRF_TRUSTED_ORIGINS
            - name: RUN_MIGRATIONS_ON_STARTUP
              value: "false"
            - name: RUN_COLLECTSTATIC_ON_STARTUP
              value: "false"
          startupProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: task-service
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: task-service
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: task-service
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 300m
              memory: 384Mi
            limits:
              cpu: 700m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: task-service
spec:
  selector:
    app: task-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
