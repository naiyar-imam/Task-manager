apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: warfield-task-manager-prod
resources:
  - namespace.yaml
  - configmap.yaml
  - databases.yaml
  - auth-service.yaml
  - task-service.yaml
  - calendar-service.yaml
  - gateway.yaml
  - ingress.yaml
images:
  - name: task-manager-auth-service
    newName: "<aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/task-manager-auth-service"
    newTag: "prod"
  - name: task-manager-task-service
    newName: "<aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/task-manager-task-service"
    newTag: "prod"
  - name: task-manager-calendar-service
    newName: "<aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/task-manager-calendar-service"
    newTag: "prod"
  - name: task-manager-gateway
    newName: "<aws-account-id>.dkr.ecr.<aws-region>.amazonaws.com/task-manager-gateway"
    newTag: "prod"
