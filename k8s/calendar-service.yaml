apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-service
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-service
  template:
    metadata:
      labels:
        app: calendar-service
    spec:
      initContainers:
        - name: wait-for-calendar-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z calendar-db 5432; do echo waiting for calendar-db; sleep 2; done"]
        - name: wait-for-task-service
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z task-service 8000; do echo waiting for task-service; sleep 2; done"]
      containers:
        - name: calendar-service
          image: task-manager-calendar-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: DEBUG
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: CALENDAR_ALLOWED_HOSTS
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: calendar-django-secret-key
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: shared-jwt-signing-key
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: CALENDAR_POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: postgres-password
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: CALENDAR_POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: POSTGRES_PORT
            - name: FRONTEND_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: FRONTEND_BASE_URL
            - name: TASK_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: TASK_SERVICE_URL
            - name: GOOGLE_CALENDAR_REDIRECT_URI
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: GOOGLE_CALENDAR_REDIRECT_URI
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: google-client-secret
            - name: GOOGLE_CALENDAR_ID
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: google-calendar-id
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: calendar-service
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: calendar-service
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: calendar-service
  namespace: task-manager
spec:
  selector:
    app: calendar-service
  ports:
    - port: 8000
      targetPort: 8000
