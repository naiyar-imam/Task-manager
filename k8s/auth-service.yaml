apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-auth-db
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z auth-db 5432; do echo waiting for auth-db; sleep 2; done"]
      containers:
        - name: auth-service
          image: task-manager-auth-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: DEBUG
            - name: ALLOWED_HOSTS
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: AUTH_ALLOWED_HOSTS
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: auth-django-secret-key
            - name: JWT_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: shared-jwt-signing-key
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: AUTH_POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: task-manager-secrets
                  key: postgres-password
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: AUTH_POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: task-manager-config
                  key: POSTGRES_PORT
            - name: SEED_DEMO_USER
              value: "true"
          readinessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: auth-service
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/
              port: 8000
              httpHeaders:
                - name: Host
                  value: auth-service
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: task-manager
spec:
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000
