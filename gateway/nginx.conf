server {
    listen 80;
    server_name _;
    server_tokens off;
    charset utf-8;
    client_max_body_size 10m;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Authorization $http_authorization;
    proxy_connect_timeout 5s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/auth/ {
        proxy_set_header Host auth-service;
        proxy_pass http://auth-service:8000/;
    }

    location /api/tasks/ {
        proxy_set_header Host task-service;
        proxy_pass http://task-service:8000/tasks/;
    }

    location /api/stats/ {
        proxy_set_header Host task-service;
        proxy_pass http://task-service:8000/stats/;
    }

    location /api/analytics/ {
        proxy_set_header Host task-service;
        proxy_pass http://task-service:8000/analytics/;
    }

    location /api/integrations/google/ {
        proxy_set_header Host calendar-service;
        proxy_pass http://calendar-service:8000/integrations/google/;
    }

    location /api/health/ {
        proxy_set_header Host auth-service;
        proxy_pass http://auth-service:8000/health/;
    }

    location /api/ {
        proxy_set_header Host auth-service;
        proxy_pass http://auth-service:8000/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
