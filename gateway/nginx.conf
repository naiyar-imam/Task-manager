server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    location /api/auth/ {
        proxy_pass http://auth-service:8000/;
    }

    location /api/tasks/ {
        proxy_pass http://task-service:8000/tasks/;
    }

    location /api/stats/ {
        proxy_pass http://task-service:8000/stats/;
    }

    location /api/analytics/ {
        proxy_pass http://task-service:8000/analytics/;
    }

    location /api/integrations/google/ {
        proxy_pass http://calendar-service:8000/integrations/google/;
    }

    location /api/health/ {
        proxy_pass http://auth-service:8000/health/;
    }

    location /api/ {
        proxy_pass http://auth-service:8000/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
