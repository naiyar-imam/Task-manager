services:
  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  task-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: task_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5434:5432"
    volumes:
      - task_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  calendar-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: calendar_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5435:5432"
    volumes:
      - calendar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d calendar_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DEBUG: "false"
      DJANGO_SECRET_KEY: auth-service-django-secret-key-change-me
      JWT_SIGNING_KEY: shared-microservice-jwt-signing-key-change-me
      JWT_ISSUER: task-manager-auth-service
      JWT_AUDIENCE: task-manager-clients
      ALLOWED_HOSTS: 127.0.0.1,localhost,auth-service,gateway
      RUN_MIGRATIONS_ON_STARTUP: "true"
      POSTGRES_DB: auth_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
      POSTGRES_HOST: auth-db
      POSTGRES_PORT: 5432
      SEED_DEMO_USER: "true"

  task-service:
    build:
      context: .
      dockerfile: services/task-service/Dockerfile
    restart: unless-stopped
    depends_on:
      task-db:
        condition: service_healthy
    environment:
      DEBUG: "false"
      DJANGO_SECRET_KEY: task-service-django-secret-key-change-me
      JWT_SIGNING_KEY: shared-microservice-jwt-signing-key-change-me
      JWT_ISSUER: task-manager-auth-service
      JWT_AUDIENCE: task-manager-clients
      ALLOWED_HOSTS: 127.0.0.1,localhost,task-service,gateway
      RUN_MIGRATIONS_ON_STARTUP: "true"
      POSTGRES_DB: task_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
      POSTGRES_HOST: task-db
      POSTGRES_PORT: 5432

  calendar-service:
    build:
      context: .
      dockerfile: services/calendar-service/Dockerfile
    restart: unless-stopped
    depends_on:
      calendar-db:
        condition: service_healthy
      task-service:
        condition: service_started
    environment:
      DEBUG: "false"
      DJANGO_SECRET_KEY: calendar-service-django-secret-key-change-me
      JWT_SIGNING_KEY: shared-microservice-jwt-signing-key-change-me
      JWT_ISSUER: task-manager-auth-service
      JWT_AUDIENCE: task-manager-clients
      ALLOWED_HOSTS: 127.0.0.1,localhost,calendar-service,gateway
      RUN_MIGRATIONS_ON_STARTUP: "true"
      POSTGRES_DB: calendar_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
      POSTGRES_HOST: calendar-db
      POSTGRES_PORT: 5432
      FRONTEND_BASE_URL: http://127.0.0.1:8080
      TASK_SERVICE_URL: http://task-service:8000
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-http://127.0.0.1:8080/api/integrations/google/callback/}
      GOOGLE_CALENDAR_ID: ${GOOGLE_CALENDAR_ID:-primary}

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    depends_on:
      auth-service:
        condition: service_started
      task-service:
        condition: service_started
      calendar-service:
        condition: service_started
    ports:
      - "8080:80"

volumes:
  auth_db_data:
  task_db_data:
  calendar_db_data:
